<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moonbeam Chain</title>
  <meta name="description" content="Moonbeam Chain is the Polkadot EVM network for cross-chain apps, reached from your own wallet.">
  <link rel="canonical" href="https://moonbeam-chain.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F6F2">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Moonbeam Chain">
  <meta property="og:description" content="Moonbeam Chain is the Polkadot EVM network for cross-chain apps, reached from your own wallet.">
  <meta property="og:url" content="https://moonbeam-chain.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Moonbeam Chain">
  <meta name="twitter:description" content="Moonbeam Chain is the Polkadot EVM network for cross-chain apps, reached from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://moonbeam-chain.github.io/#website",
        "url": "https://moonbeam-chain.github.io/",
        "name": "Moonbeam Chain",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://moonbeam-chain.github.io/#organization",
        "name": "Moonbeam Network",
        "url": "https://moonbeam.network/"
      },
      {
        "@type": "WebApplication",
        "@id": "https://moonbeam-chain.github.io/#app",
        "name": "Moonbeam Chain",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://moonbeam-chain.github.io/"
      }
    ]
  }
  </script>

  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
</head>
<body>
  <header class="topbar">
    <div class="brand" aria-label="Moonbeam Chain home">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Moonbeam Chain</span>
    </div>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://moonscan.io/" target="_blank" rel="nofollow noopener noreferrer">Moonscan</a>
      <a href="https://moonbeam.network/" target="_blank" rel="nofollow noopener noreferrer">Network</a>
      <a href="https://www.coingecko.com/en/coins/moonbeam" target="_blank" rel="nofollow noopener noreferrer">CoinGecko</a>
    </nav>
    <span class="spacer" aria-hidden="true"></span>
    <a class="ghost" href="dashboard/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-label="Moonbeam Chain">
      <h1>Moonbeam Chain</h1>
      <p class="sub"><strong>Moonbeam Chain</strong> is the Polkadot EVM network for cross-chain apps, reached from your own wallet.</p>
    </section>

    <section class="app-card" aria-label="Bridge route">
      <div class="route">
        <div class="leg" data-leg="from">
          <span class="label">From</span>
          <span class="chip">
            <img src="eth.png" width="28" height="28" alt="Ethereum">
            <span>Ethereum</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch route direction">
          <span aria-hidden="true">&rarr;</span>
        </button>
        <div class="leg" data-leg="to">
          <span class="label">To</span>
          <span class="chip">
            <img src="glmr.png" width="28" height="28" alt="Moonbeam">
            <span>Moonbeam</span>
          </span>
        </div>
      </div>
      <a class="primary" href="dashboard/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="foot">Moonbeam Chain &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;
    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length !== 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  }());
  </script>
</body>
</html>
